<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamForge - Authentication</title>
    <link rel="stylesheet" href="logstyle.css">
</head>

<body>

    <div class="card-container">
        <div class="form-section">

            <header class="header">
                <div class="logo">
                    <span class="logo-icon">TF</span>
                    <span class="logo-text">TeamForge</span>
                </div>
                <a href="#" class="home-icon">⌂</a>
            </header>

            <div id="login-view" class="view-section active">
                <h1 class="main-title">WELCOME BACK!</h1>
                <p class="subtitle">Don't have a account, <a href="#" id="go-to-signup" class="link-blue">Sign up</a>
                </p>

                <form class="auth-form" id="login-form" onsubmit="event.preventDefault();">
                    <div class="input-group">
                        <label>Username / Email</label>
                        <input id="login-username" type="text" placeholder="username or name@example.com"
                            autocomplete="username">
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input id="login-password" type="password" placeholder="••••••"
                                autocomplete="current-password">
                            <button type="button" class="toggle-password"
                                aria-label="Toggle password visibility">👁</button>
                        </div>
                    </div>

                    <div class="options-row">
                        <label class="remember-me">
                            <input type="radio" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forget password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Sign In</button>
                </form>

                <div class="divider">
                    <span>or continue with</span>
                </div>

                <div class="social-login">
                    <button class="btn-social">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 38 38" fill="none">
                            <g clip-path="url(#clip0_151_6452)">
                                <path
                                    d="M8.4216 22.9639L7.09888 27.9018L2.26434 28.0041C0.819524 25.3243 0 22.2582 0 19C0 15.8493 0.766235 12.8782 2.12444 10.2621H2.12548L6.42957 11.0512L8.31502 15.3294C7.9204 16.4799 7.70532 17.7149 7.70532 19C7.70547 20.3947 7.95811 21.731 8.4216 22.9639Z"
                                    fill="#FBBB00" />
                                <path
                                    d="M37.6681 15.4506C37.8863 16.5999 38 17.7869 38 19C38 20.3603 37.857 21.6872 37.5846 22.9671C36.6597 27.3224 34.2429 31.1256 30.8949 33.8169L30.8939 33.8158L25.4726 33.5392L24.7054 28.7495C26.9269 27.4467 28.663 25.4078 29.5775 22.9671H19.4177V15.4506H29.7258H37.6681Z"
                                    fill="#518EF8" />
                                <path
                                    d="M30.8937 33.8159L30.8948 33.8169C27.6387 36.4341 23.5025 38 18.9999 38C11.7643 38 5.47343 33.9558 2.26428 28.0042L8.42155 22.964C10.0261 27.2463 14.157 30.2946 18.9999 30.2946C21.0816 30.2946 23.0317 29.7319 24.7051 28.7496L30.8937 33.8159Z"
                                    fill="#28B446" />
                                <path
                                    d="M31.1277 4.37416L24.9725 9.41331C23.2406 8.33076 21.1934 7.70539 19.0001 7.70539C14.0475 7.70539 9.83933 10.8936 8.31517 15.3294L2.12555 10.2621H2.12451C5.28667 4.16538 11.6569 0 19.0001 0C23.6102 0 27.8371 1.64216 31.1277 4.37416Z"
                                    fill="#F14336" />
                            </g>
                            <defs>
                                <clipPath id="clip0_151_6452">
                                    <rect width="38" height="38" fill="white" />
                                </clipPath>
                            </defs>
                        </svg>
                        Sign in with google
                    </button>
                    <button class="btn-social">
                        <img src="Assets/github_logo.png" alt="github" class="gt">
                        Sign in with github
                    </button>
                </div>
            </div>

            <div id="signup-view" class="view-section">
                <h1 class="main-title normal-case">New User?</h1>

                <form class="auth-form" id="signup-form" onsubmit="event.preventDefault();">
                    <div class="input-group">
                        <label>Username</label>
                        <input id="signup-username" type="text" placeholder="deniel123"
                            autocomplete="username">
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input id="signup-email" type="email" placeholder="name@example.com"
                            autocomplete="email">
                    </div>

                    <div class="input-group">
                        <label>Enter New Password</label>
                        <div class="password-wrapper">
                            <input id="signup-password" type="password" placeholder="••••••"
                                autocomplete="new-password">
                            <button type="button" class="toggle-password"
                                aria-label="Toggle password visibility">👁</button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Confirm Password</label>
                        <div class="password-wrapper">
                            <input id="signup-confirm-password" type="password" placeholder="••••••"
                                autocomplete="new-password">
                            <button type="button" class="toggle-password"
                                aria-label="Toggle password visibility">👁</button>
                        </div>
                    </div>

                    <div class="options-row center-options">
                        <label class="remember-me">
                            <input type="radio" name="remember_new">
                            <span>Remember me</span>
                        </label>
                    </div>

                    <button type="submit" class="btn-primary">Create account</button>
                </form>

                <div class="divider">
                    <span>or continue with</span>
                </div>

                <div class="social-login">
                    <button class="btn-social">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 38 38" fill="none">
                            <g clip-path="url(#clip0_151_6452)">
                                <path
                                    d="M8.4216 22.9639L7.09888 27.9018L2.26434 28.0041C0.819524 25.3243 0 22.2582 0 19C0 15.8493 0.766235 12.8782 2.12444 10.2621H2.12548L6.42957 11.0512L8.31502 15.3294C7.9204 16.4799 7.70532 17.7149 7.70532 19C7.70547 20.3947 7.95811 21.731 8.4216 22.9639Z"
                                    fill="#FBBB00" />
                                <path
                                    d="M37.6681 15.4506C37.8863 16.5999 38 17.7869 38 19C38 20.3603 37.857 21.6872 37.5846 22.9671C36.6597 27.3224 34.2429 31.1256 30.8949 33.8169L30.8939 33.8158L25.4726 33.5392L24.7054 28.7495C26.9269 27.4467 28.663 25.4078 29.5775 22.9671H19.4177V15.4506H29.7258H37.6681Z"
                                    fill="#518EF8" />
                                <path
                                    d="M30.8937 33.8159L30.8948 33.8169C27.6387 36.4341 23.5025 38 18.9999 38C11.7643 38 5.47343 33.9558 2.26428 28.0042L8.42155 22.964C10.0261 27.2463 14.157 30.2946 18.9999 30.2946C21.0816 30.2946 23.0317 29.7319 24.7051 28.7496L30.8937 33.8159Z"
                                    fill="#28B446" />
                                <path
                                    d="M31.1277 4.37416L24.9725 9.41331C23.2406 8.33076 21.1934 7.70539 19.0001 7.70539C14.0475 7.70539 9.83933 10.8936 8.31517 15.3294L2.12555 10.2621H2.12451C5.28667 4.16538 11.6569 0 19.0001 0C23.6102 0 27.8371 1.64216 31.1277 4.37416Z"
                                    fill="#F14336" />
                            </g>
                            <defs>
                                <clipPath id="clip0_151_6452">
                                    <rect width="38" height="38" fill="white" />
                                </clipPath>
                            </defs>
                        </svg>
                        Sign up with google
                    </button>
                    <button class="btn-social">
                        <img src="Assets/github_logo.png" alt="github" class="gt">
                        Sign up with github
                    </button>
                </div>

                <div class="back-to-login">
                    <a href="#" id="go-to-login" class="link-blue"
                        style="font-size: 13px; margin-top: 15px; display: inline-block;">&larr; Back to Sign In</a>
                </div>
            </div>

        </div>

        <div class="image-section">
            <img src="Assets/login_sin.jpg" alt="Developer Illustration">
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/store/data.js"></script>
    <script src="logscript.js"></script>
</body>

</html>
